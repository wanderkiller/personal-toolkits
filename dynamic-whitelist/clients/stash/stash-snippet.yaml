rules:
  - DOMAIN,wl.example.com,DIRECT

cron:
  script:
    # Low-power fallback: refresh once per day while Stash Network Extension is connected.
    # Stash does not provide a documented network-change script event, so use iOS Shortcuts
    # automation for immediate refresh when Wi-Fi/cellular changes.
    - name: whitelist-keepalive
      cron: '17 9 * * *'
      timeout: 10

script-providers:
  whitelist-keepalive:
    url: https://wl.example.com/client/stash/whitelist.js
    interval: 86400