[filter_local]
host, wl.example.com, direct

[task_local]
# Immediate refresh when Quantumult X detects a network change. The tunnel must be running.
event-network https://wl.example.com/client/quantumult-x/whitelist.js, tag=Whitelist Network, enabled=true

# Low-power fallback: refresh once per day in case no network-change event fires.
17 9 * * * https://wl.example.com/client/quantumult-x/whitelist.js, tag=Whitelist Daily, enabled=true