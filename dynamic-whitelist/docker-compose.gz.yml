services:
  gz-agent:
    build:
      context: .
      dockerfile: docker/gz-agent/Dockerfile
    image: dynamic-whitelist-gz-agent:latest
    container_name: dynamic-whitelist-gz-agent
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - ./env/gz-agent.env
    environment:
      ALLOWLIST_STATE: /data/state.json
    volumes:
      - /var/lib/dynamic-whitelist:/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os, urllib.request; host=os.environ.get('GZ_AGENT_HOST','127.0.0.1'); port=os.environ.get('GZ_AGENT_PORT','9001'); urllib.request.urlopen(f'http://{host}:{port}/healthz', timeout=2).read()\""]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

