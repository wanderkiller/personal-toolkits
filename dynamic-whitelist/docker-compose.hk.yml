services:
  hk-relay:
    build:
      context: .
      dockerfile: docker/hk-relay/Dockerfile
    image: dynamic-whitelist-hk-relay:latest
    container_name: dynamic-whitelist-hk-relay
    restart: unless-stopped
    env_file:
      - ./env/hk-relay.env
    environment:
      HK_RELAY_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/healthz', timeout=2).read()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

