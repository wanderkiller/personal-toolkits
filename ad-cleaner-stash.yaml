name: WSJ Ad Cleaner
desc: 清除 www.wsj.com 和 cn.wsj.com 的广告占位

http:
  mitm:
    - "www.wsj.com"
    - "cn.wsj.com"
  
  script:
    - match: ^https?:\/\/(www|cn)\.wsj\.com\/(?!.*\.(?:js|css|json|jpg|jpeg|png|webp|gif|svg|woff2?|ttf|ico|map|mp4|m3u8|woff|eot)(?:\?|$)).*
      name: wsj-ad-cleaner
      type: response
      require-body: true

script-providers:
  wsj-ad-cleaner:
    url: https://cdn.jsdelivr.net/gh/wanderkiller/personal-toolkits@refs/heads/main/ad-cleaner.js
    interval: 86400
